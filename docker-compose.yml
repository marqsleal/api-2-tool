services:
  api-2-tool:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: api-2-tool
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - api2tool_data:/app/data

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull-phi3mini:
    image: ollama/ollama:latest
    container_name: ollama-pull-phi3mini
    depends_on:
      - ollama
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until OLLAMA_HOST=http://ollama:11434 ollama list >/dev/null 2>&1;
      do sleep 1; done;
      OLLAMA_HOST=http://ollama:11434 ollama pull phi3:mini"

  chatbot-api:
    build:
      context: ./chat
      dockerfile: Dockerfile
    container_name: chatbot-api
    restart: unless-stopped
    depends_on:
      - api-2-tool
      - ollama
      - ollama-pull-phi3mini
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: phi3:mini
      TOOLS_API_BASE_URL: http://api-2-tool:8080
    command: uvicorn chatbot:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  chatbot-ui:
    build:
      context: ./chat
      dockerfile: Dockerfile
    container_name: chatbot-ui
    restart: unless-stopped
    depends_on:
      - chatbot-api
    environment:
      CHATBOT_API_URL: http://chatbot-api:8000
    command: streamlit run ui.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"

volumes:
  ollama_data:
  api2tool_data:
